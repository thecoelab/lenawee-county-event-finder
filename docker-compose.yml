version: '3.8'

services:
  lenawee-events:
    build: .
    container_name: lenawee-events
    restart: unless-stopped
    ports:
      - "3100:3000"
    environment:
      - NODE_ENV=production
      - PORT=3000
    networks:
      - openclaw_default

networks:
  openclaw_default:
    external: true